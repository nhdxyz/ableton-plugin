name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos-build-test:
    name: macOS build and CTest
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build and test
        env:
          SKIP_PLUGINVAL: "1"
        run: tools/validate_release.sh
