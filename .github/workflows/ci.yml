name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos-build-test:
    name: macOS build and CTest
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Download pluginval
        run: echo "PLUGINVAL_BIN=$(tools/fetch_pluginval.sh)" >> "$GITHUB_ENV"

      - name: Build and test
        env:
          PLUGINVAL_SKIP_GUI_TESTS: "1"
        run: tools/validate_release.sh

      - name: Package evidence smoke
        env:
          RUN_VALIDATE: "0"
          CREATE_PKG: "0"
          PACKAGE_NAME: NateVST-ci-package-smoke
        run: tools/package_release.sh

      - name: Upload release validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nate-vst-release-validation
          path: |
            build/release-validation/
            build/pluginval/
            dist/NateVST-ci-package-smoke/ABLETON_VALIDATION_REPORT.md
            dist/NateVST-ci-package-smoke/RELEASE_MANIFEST.txt
            dist/NateVST-ci-package-smoke/SHA256SUMS
            dist/NateVST-ci-package-smoke-release-summary.txt
          if-no-files-found: warn
